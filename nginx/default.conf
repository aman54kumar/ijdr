server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed Angular assets: long cache (filename changes each build).
    location ~* \.(?:js|mjs|css|map|ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA shell: always revalidate so new deployments are picked up after refresh.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    location /graphql/ {
        proxy_pass http://backend:8000/graphql/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        alias /app/static/;
    }

    # Portal Admin (Angular) lives at /admin (client-side route),
    # so we intentionally do NOT proxy /admin/ to Django.

    location /django-admin/ {
        proxy_pass http://backend:8000/django-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

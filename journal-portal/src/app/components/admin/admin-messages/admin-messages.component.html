<div class="messages-panel">
  <h2 class="mb-3">Contact messages</h2>
  <p class="text-muted small mb-4">
    Submissions from the website contact form (Firestore). Mark as read when handled.
  </p>

  <div *ngIf="loading" class="text-center py-4">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div *ngIf="!loading && messages.length === 0" class="alert alert-secondary">
    No messages yet.
  </div>

  <div *ngIf="!loading && messages.length > 0" class="list-group">
    <div
      *ngFor="let m of messages"
      class="list-group-item"
      [class.list-group-item-light]="m.read"
    >
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <strong>{{ m.name }}</strong>
          <span class="text-muted ms-2">&lt;{{ m.email }}&gt;</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <small class="text-muted" *ngIf="m.createdAt?.toDate">{{
            m.createdAt!.toDate() | date : 'medium'
          }}</small>
          <span class="badge bg-secondary" *ngIf="m.read">Read</span>
          <button
            *ngIf="!m.read"
            type="button"
            class="btn btn-sm btn-outline-primary"
            (click)="markRead(m)"
          >
            Mark read
          </button>
        </div>
      </div>
      <p class="mb-0 mt-2 small message-body">{{ m.message }}</p>
    </div>
  </div>
</div>

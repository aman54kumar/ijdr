<div class="app-container">
  <app-header class="app-header"></app-header>
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
  <app-footer class="app-footer"></app-footer>
</div>

<app-pdf-modal></app-pdf-modal>

@if (activeToast) {
  <div
    class="toast-container position-fixed bottom-0 end-0 p-3"
    style="z-index: 1080"
  >
    <div
      class="toast show"
      role="alert"
      [ngClass]="{
        'text-bg-success': activeToast.kind === 'success',
        'text-bg-danger': activeToast.kind === 'danger',
        'text-bg-warning': activeToast.kind === 'warning',
        'text-bg-primary': activeToast.kind === 'info',
      }"
    >
      <div class="d-flex">
        <div class="toast-body">{{ activeToast.body }}</div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          (click)="dismissToast()"
          aria-label="Close"
        ></button>
      </div>
    </div>
  </div>
}

@if (confirmPrompt) {
  <div
    class="modal fade show d-block"
    tabindex="-1"
    style="background: rgba(0, 0, 0, 0.45)"
    role="dialog"
    aria-modal="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ confirmPrompt.title }}</h5>
        </div>
        <div class="modal-body">
          <p class="mb-0">{{ confirmPrompt.message }}</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="confirmNo()">
            Cancel
          </button>
          <button type="button" class="btn btn-primary" (click)="confirmYes()">
            OK
          </button>
        </div>
      </div>
    </div>
  </div>
}
